name: Compilar IPA Real de 32 bits (iOS 7+)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Descargar Código
      uses: actions/checkout@v5

    - name: Compilar Proyecto Nativo
      run: |
        cd App
        xcodebuild -project "WhatsApp Legacy.xcodeproj" -scheme "WhatsApp Legacy" -sdk iphoneos IPHONEOS_DEPLOYMENT_TARGET=7.0 CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO -configuration Release clean build

    - name: Empaquetar en formato IPA Valido
      run: |
        mkdir -p Payload
        cp -r App/build/Release-iphoneos/*.app Payload/ 2>/dev/null || cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app Payload/
        zip -r ZevenApp_iOS7.ipa Payload
        mkdir -p output
        mv ZevenApp_iOS7.ipa output/

    - name: Subir Archivo IPA Terminado
      uses: actions/upload-artifact@v5
      with:
        name: ZevenApp-iOS7-32bit
        path: output/ZevenApp_iOS7.ipa
